<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONTROLE ANALÍTICO EOS-BR | Shopee Operations</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>

    <style>
        :root {
            --shopee-orange: #ee4d2d;
            --shopee-orange-glow: rgba(238, 77, 45, 0.15);
            --bg-deep: #05070a;
            --bg-card: #0d1117;
            --bg-input: #161b22;
            --border: #30363d;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --accent-blue: #2f81f7;
            --accent-green: #3fb950;
            --accent-purple: #8957e5;
            --accent-yellow: #d29922;
            --accent-cyan: #39c5cf;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-main);
            font-size: 12px;
            line-height: 1.3;
        }

        header {
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(8px);
            border-bottom: 1px solid var(--border);
            padding: 0 15px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo-area { display: flex; align-items: center; gap: 8px; }
        .logo-shopee { background: var(--shopee-orange); color: white; padding: 2px 6px; border-radius: 4px; font-weight: 800; font-size: 12px; }
        .logo-title { font-weight: 700; font-size: 13px; letter-spacing: -0.5px; }

        .header-tools { display: flex; align-items: center; gap: 15px; }
        .real-time-clock { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--shopee-orange); }

        .filter-section {
            padding: 8px 15px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: #0d1117;
            border-bottom: 1px solid var(--border);
        }

        .filter-group select, .cd-select-custom {
            background: var(--bg-input);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 11px;
            min-width: 140px;
            height: 30px;
            cursor: pointer;
        }

        .filter-special {
            background: linear-gradient(135deg, #ee4d2d, #ff8c00) !important;
            color: white !important;
            font-weight: 800 !important;
            border: none !important;
        }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            padding: 10px 15px;
        }

        .kpi-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .kpi-label { font-size: 11px; color: var(--text-dim); }
        .kpi-value { font-size: 18px; font-weight: 800; margin-top: 4px; }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 10px;
            padding: 5px 15px 10px 15px;
        }

        .chart-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            min-height: 250px;
        }

        .c-span-4 { grid-column: span 4; }
        .c-span-6 { grid-column: span 6; }
        .c-span-8 { grid-column: span 8; }
        .c-span-12 { grid-column: span 12; }

        .heatmap-grid {
            display: grid;
            grid-template-columns: 60px repeat(7, 1fr);
            gap: 4px;
            margin-top: 10px;
        }
        .heatmap-cell {
            height: 35px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
            color: white;
            background: rgba(255,255,255,0.05);
        }

        .table-section { padding: 15px; }
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; }
        th { background: #161b22; padding: 10px; font-size: 10px; color: var(--text-dim); text-align: left; }
        td { padding: 10px; border-bottom: 1px solid var(--border); font-size: 11px; }

        .hidden { display: none !important; }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-deep); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .breadcrumb-bar {
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 10px 15px; margin: 10px 15px;
            border-radius: 8px; font-weight: 600;
        }

        .nav-transition-box {
            background: rgba(13, 17, 23, 0.6);
            border: 1px dashed var(--border);
            padding: 15px; margin: 15px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }

        @media (max-width: 1024px) {
            .c-span-4, .c-span-6, .c-span-8 { grid-column: span 12; }
        }
    </style>
</head>
<body>

<div id="loadingOverlay">
    <div style="border: 4px solid var(--border); border-top: 4px solid var(--shopee-orange); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite;"></div>
    <h3 style="margin-top: 20px;">Carregando Base EOS-BR...</h3>
</div>

<header>
    <div class="logo-area">
        <div class="logo-shopee">S</div>
        <div class="logo-title">CONTROLE ANALÍTICO <span style="color:var(--shopee-orange)">EOS-BR</span></div>
    </div>
    <div class="header-tools">
        <div class="real-time-clock" id="clock">00:00:00</div>
        <div id="sync-status" class="kpi-label">Sincronizando...</div>
    </div>
</header>

<div class="filter-section">
    <select id="analysis-mode" class="filter-group filter-special" onchange="Dashboard.toggleMode()">
        <option value="padrao">ANÁLISE OPERACIONAL</option>
        <option value="idle">ANÁLISE SUBPROCESSO</option>
    </select>
    <select id="f-mes" onchange="Dashboard.applyFilters()"><option value="">Mês</option></select>
    <select id="f-turno" onchange="Dashboard.applyFilters()"><option value="">Turno</option></select>
    <select id="f-cd" onchange="Dashboard.applyFilters()"><option value="">CD</option></select>
    <select id="f-cargo" onchange="Dashboard.applyFilters()"><option value="">Cargo</option></select>
</div>

<!-- DASHBOARD OPERACIONAL -->
<div id="view-padrao">
    <div class="kpi-grid">
        <div class="kpi-card">
            <div><div class="kpi-label">Registros</div><div class="kpi-value" id="kpi-total">0</div></div>
            <i class="fas fa-database" style="color: var(--accent-blue)"></i>
        </div>
        <div class="kpi-card">
            <div><div class="kpi-label">Média OPA</div><div class="kpi-value" id="kpi-opa-avg">0%</div></div>
            <i class="fas fa-chart-line" style="color: var(--accent-green)"></i>
        </div>
        <div class="kpi-card">
            <div><div class="kpi-label">IDLE Brasil</div><div class="kpi-value" id="kpi-idle-br">0%</div></div>
            <i class="fas fa-clock" style="color: var(--accent-cyan)"></i>
        </div>
        <div class="kpi-card">
            <div><div class="kpi-label">Meta</div><div class="kpi-value">95.0%</div></div>
            <i class="fas fa-bullseye" style="color: var(--shopee-orange)"></i>
        </div>
    </div>

    <div class="charts-container">
        <div class="chart-box c-span-4"><canvas id="ch-turno"></canvas></div>
        <div class="chart-box c-span-4"><canvas id="ch-cd"></canvas></div>
        <div class="chart-box c-span-4"><canvas id="ch-area"></canvas></div>
        <div class="chart-box c-span-12">
            <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                <strong>Heatmap de Volume (Turno vs Dia)</strong>
            </div>
            <div id="heatmap-op"></div>
        </div>
    </div>
</div>

<!-- DASHBOARD SUBPROCESSO (JERARQUÍA) -->
<div id="view-idle" class="hidden">
    <div class="breadcrumb-bar" id="idle-breadcrumb">Brasil</div>
    
    <div id="idle-lvl-1">
        <div class="kpi-grid">
            <div class="kpi-card"><div><div class="kpi-label">IDLE</div><div id="br-idle" class="kpi-value">0%</div></div></div>
            <div class="kpi-card"><div><div class="kpi-label">OPA</div><div id="br-opa" class="kpi-value">0%</div></div></div>
            <div class="kpi-card"><div><div class="kpi-label">DDSMA</div><div id="br-ddsma" class="kpi-value">0%</div></div></div>
            <div class="kpi-card"><div><div class="kpi-label">DDQA</div><div id="br-ddqa" class="kpi-value">0%</div></div></div>
        </div>
        <div class="nav-transition-box">
            <span>Selecione um CD:</span>
            <select id="idle-cd-sel" class="cd-select-custom" onchange="Dashboard.drillDownCD(this.value)"></select>
        </div>
    </div>

    <div id="idle-lvl-2" class="hidden">
        <div class="charts-container">
            <div class="chart-box c-span-6"><canvas id="ch-cd-daily"></canvas></div>
            <div class="chart-box c-span-6"><canvas id="ch-cd-metrics"></canvas></div>
        </div>
        <div class="nav-transition-box">
            <span>Selecione uma Área:</span>
            <select id="idle-area-sel" class="cd-select-custom" onchange="Dashboard.drillDownArea(this.value)"></select>
        </div>
    </div>

    <div id="idle-lvl-3" class="hidden">
        <div class="charts-container">
            <div class="chart-box c-span-12"><canvas id="ch-area-ind"></canvas></div>
        </div>
    </div>
</div>

<div class="table-section">
    <div class="table-wrapper">
        <div style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
            <strong>Histórico Detalhado</strong>
            <input type="text" id="table-search" placeholder="Pesquisar..." style="background:var(--bg-input); border:1px solid var(--border); color:white; padding:5px 10px; border-radius:4px;" onkeyup="Dashboard.renderTable()">
        </div>
        <div style="overflow-x: auto; max-height: 400px;">
            <table id="main-table">
                <thead><tr id="table-head"></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "TU_WEB_APP_URL_AQUÍ"; // REEMPLAZAR CON TU URL DE APPS SCRIPT
    
    const Dashboard = {
        rawData: [],
        filteredData: [],
        charts: {},
        mode: 'padrao',
        selection: { cd: '', area: '', indicator: '' },

        async init() {
            Chart.register(ChartDataLabels);
            this.updateClock();
            setInterval(() => this.updateClock(), 1000);
            await this.fetchData();
            setInterval(() => this.fetchData(), 60000);
        },

        updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
        },

        async fetchData() {
            try {
                const response = await fetch(GAS_URL);
                const data = await response.json();
                if (data.status === "error") throw new Error(data.message);
                
                this.rawData = data;
                this.processInitialData();
                this.applyFilters();
                document.getElementById('loadingOverlay').classList.add('hidden');
                document.getElementById('sync-status').innerText = "Sincronizado: " + new Date().toLocaleTimeString();
            } catch (e) {
                console.error(e);
                document.getElementById('sync-status').innerText = "Erro na conexión";
            }
        },

        processInitialData() {
            // Llenar filtros dinámicos
            this.fillSelect('f-mes', [...new Set(this.rawData.map(d => this.parseDate(d['Data/Hora']).mes))]);
            this.fillSelect('f-turno', [...new Set(this.rawData.map(d => d['Turno']))]);
            this.fillSelect('f-cd', [...new Set(this.rawData.map(d => d['CD']))]);
            this.fillSelect('f-cargo', [...new Set(this.rawData.map(d => d['Cargo']))]);
            this.fillSelect('idle-cd-sel', [...new Set(this.rawData.map(d => d['CD']))]);
        },

        parseDate(str) {
            if (!str) return { mes: '', dia: '' };
            const parts = str.split(' ')[0].split('/');
            const d = new Date(parts[2], parts[1]-1, parts[0]);
            const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
            const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
            return { mes: meses[d.getMonth()], dia: dias[d.getDay()] };
        },

        fillSelect(id, list) {
            const sel = document.getElementById(id);
            const val = sel.value;
            sel.innerHTML = `<option value="">${sel.options[0].text}</option>` + 
                list.filter(Boolean).sort().map(i => `<option value="${i}">${i}</option>`).join('');
            sel.value = val;
        },

        applyFilters() {
            const fMes = document.getElementById('f-mes').value;
            const fTurno = document.getElementById('f-turno').value;
            const fCd = document.getElementById('f-cd').value;
            const fCargo = document.getElementById('f-cargo').value;

            this.filteredData = this.rawData.filter(d => {
                const dDate = this.parseDate(d['Data/Hora']);
                return (!fMes || dDate.mes === fMes) &&
                       (!fTurno || d['Turno'] === fTurno) &&
                       (!fCd || d['CD'] === fCd) &&
                       (!fCargo || d['Cargo'] === fCargo);
            });

            this.updateDashboard();
        },

        updateDashboard() {
            this.renderKPIs();
            this.renderCharts();
            this.renderHeatmap();
            this.renderTable();
            if(this.mode === 'idle') this.renderIdleHierarchy();
        },

        renderKPIs() {
            document.getElementById('kpi-total').innerText = this.filteredData.length;
            
            const opaAvg = this.calculateAvg(this.filteredData, 'OPA');
            document.getElementById('kpi-opa-avg').innerText = opaAvg.toFixed(1) + '%';
            
            const idleBr = this.calculateAvg(this.filteredData, 'IDLE TIME');
            document.getElementById('kpi-idle-br').innerText = idleBr.toFixed(1) + '%';
        },

        calculateAvg(data, keyPart) {
            const col = Object.keys(this.rawData[0]).find(k => k.toUpperCase().includes(keyPart.toUpperCase()));
            if(!col) return 0;
            const vals = data.map(d => parseFloat(String(d[col]).replace('%',''))).filter(v => !isNaN(v));
            return vals.length ? vals.reduce((a,b) => a+b, 0) / vals.length : 0;
        },

        renderCharts() {
            this.createBarChart('ch-turno', 'Volume por Turno', 'Turno', varColor('--shopee-orange'));
            this.createBarChart('ch-cd', 'Volume por CD', 'CD', varColor('--accent-blue'));
            this.createBarChart('ch-area', 'Volume por Área', 'Área', varColor('--accent-purple'));
        },

        createBarChart(canvasId, label, key, color) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            const counts = {};
            this.filteredData.forEach(d => counts[d[key]] = (counts[d[key]] || 0) + 1);
            
            if(this.charts[canvasId]) this.charts[canvasId].destroy();
            this.charts[canvasId] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{ label, data: Object.values(counts), backgroundColor: color }]
                },
                options: this.getChartOptions()
            });
        },

        renderHeatmap() {
            const days = ["Segunda","Terça","Quarta","Quinta","Sexta","Sábado","Domingo"];
            const turnos = ["T1","T2","T3","T4","T5","T6","T7"];
            const matrix = {};
            
            this.filteredData.forEach(d => {
                const day = this.parseDate(d['Data/Hora']).dia;
                const turn = d['Turno'];
                if(!matrix[turn]) matrix[turn] = {};
                matrix[turn][day] = (matrix[turn][day] || 0) + 1;
            });

            let html = `<div class="heatmap-grid"><div></div>` + days.map(d => `<div style="text-align:center; font-size:9px;">${d.substring(0,3)}</div>`).join('');
            
            turnos.forEach(t => {
                html += `<div style="font-weight:bold;">${t}</div>`;
                days.forEach(d => {
                    const val = (matrix[t] && matrix[t][d]) || 0;
                    const opacity = Math.min(val / 10, 1);
                    html += `<div class="heatmap-cell" style="background:rgba(238, 77, 45, ${opacity})">${val}</div>`;
                });
            });
            document.getElementById('heatmap-op').innerHTML = html + `</div>`;
        },

        renderTable() {
            const query = document.getElementById('table-search').value.toLowerCase();
            const head = document.getElementById('table-head');
            const body = document.getElementById('table-body');
            
            const cols = ['Data/Hora', 'CD', 'Turno', 'Nome Responsável', 'Cargo', 'Área'];
            head.innerHTML = cols.map(c => `<th>${c}</th>`).join('');
            
            body.innerHTML = this.filteredData
                .filter(d => Object.values(d).some(v => String(v).toLowerCase().includes(query)))
                .slice(0, 50)
                .map(d => `<tr>${cols.map(c => `<td>${d[c] || ''}</td>`).join('')}</tr>`)
                .join('');
        },

        toggleMode() {
            this.mode = document.getElementById('analysis-mode').value;
            document.getElementById('view-padrao').classList.toggle('hidden', this.mode === 'idle');
            document.getElementById('view-idle').classList.toggle('hidden', this.mode === 'padrao');
            if(this.mode === 'idle') this.renderIdleHierarchy();
        },

        // --- LÓGICA DE JERARQUÍA ---
        renderIdleHierarchy() {
            // Nivel 1: Brasil
            const idle = this.calculateAvg(this.rawData, 'IDLE TIME');
            const opa = this.calculateAvg(this.rawData, 'OPA');
            const ddsma = this.calculateAvg(this.rawData, 'DDSMA');
            const ddqa = this.calculateAvg(this.rawData, 'DDQA');

            this.updateKpiColor('br-idle', idle, 95);
            this.updateKpiColor('br-opa', opa, 95);
            this.updateKpiColor('br-ddsma', ddsma, 100);
            this.updateKpiColor('br-ddqa', ddqa, 100);

            this.updateBreadcrumb();
        },

        drillDownCD(cd) {
            this.selection.cd = cd;
            this.selection.area = '';
            document.getElementById('idle-lvl-2').classList.remove('hidden');
            
            const cdData = this.rawData.filter(d => d['CD'] === cd);
            this.fillSelect('idle-area-sel', [...new Set(cdData.map(d => d['Área']))]);
            
            this.renderCdCharts(cdData);
            this.updateBreadcrumb();
        },

        renderCdCharts(data) {
            const ctx1 = document.getElementById('ch-cd-daily').getContext('2d');
            const days = {};
            data.forEach(d => {
                const day = this.parseDate(d['Data/Hora']).dia;
                days[day] = (days[day] || 0) + 1;
            });

            if(this.charts['ch-cd-daily']) this.charts['ch-cd-daily'].destroy();
            this.charts['ch-cd-daily'] = new Chart(ctx1, {
                type: 'line',
                data: {
                    labels: Object.keys(days),
                    datasets: [{ label: 'Registros Diários', data: Object.values(days), borderColor: varColor('--accent-blue'), tension: 0.3 }]
                },
                options: this.getChartOptions()
            });

            const ctx2 = document.getElementById('ch-cd-metrics').getContext('2d');
            const metrics = {
                IDLE: this.calculateAvg(data, 'IDLE TIME'),
                OPA: this.calculateAvg(data, 'OPA'),
                DDSMA: this.calculateAvg(data, 'DDSMA'),
                DDQA: this.calculateAvg(data, 'DDQA')
            };

            if(this.charts['ch-cd-metrics']) this.charts['ch-cd-metrics'].destroy();
            this.charts['ch-cd-metrics'] = new Chart(ctx2, {
                type: 'radar',
                data: {
                    labels: Object.keys(metrics),
                    datasets: [{ label: 'Métricas CD', data: Object.values(metrics), backgroundColor: 'rgba(47, 129, 247, 0.2)', borderColor: varColor('--accent-blue') }]
                },
                options: { scales: { r: { beginAtZero: true, max: 100 } } }
            });
        },

        drillDownArea(area) {
            this.selection.area = area;
            document.getElementById('idle-lvl-3').classList.remove('hidden');
            
            const areaData = this.rawData.filter(d => d['CD'] === this.selection.cd && d['Área'] === area);
            this.renderAreaCharts(areaData);
            this.updateBreadcrumb();
        },

        renderAreaCharts(data) {
            const ctx = document.getElementById('ch-area-ind').getContext('2d');
            const metrics = ['IDLE TIME', 'OPA', 'DDSMA', 'DDQA'];
            const values = metrics.map(m => this.calculateAvg(data, m));

            if(this.charts['ch-area-ind']) this.charts['ch-area-ind'].destroy();
            this.charts['ch-area-ind'] = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: metrics,
                    datasets: [{ label: 'Atingimento por Área (%)', data: values, backgroundColor: [varColor('--accent-cyan'), varColor('--accent-yellow'), varColor('--accent-green'), varColor('--accent-purple')] }]
                },
                options: {
                    ...this.getChartOptions(),
                    indexAxis: 'y',
                    scales: { x: { max: 100 } }
                }
            });
        },

        updateBreadcrumb() {
            let b = `Brasil`;
            if(this.selection.cd) b += ` > ${this.selection.cd}`;
            if(this.selection.area) b += ` > ${this.selection.area}`;
            document.getElementById('idle-breadcrumb').innerText = b;
        },

        updateKpiColor(id, val, meta) {
            const el = document.getElementById(id);
            el.innerText = val.toFixed(1) + '%';
            el.style.color = val >= meta ? varColor('--accent-green') : (val >= meta * 0.9 ? varColor('--accent-yellow') : varColor('--shopee-orange'));
        },

        getChartOptions() {
            return {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false }, datalabels: { color: '#fff', font: { weight: 'bold' } } },
                scales: { 
                    y: { grid: { color: '#30363d' }, ticks: { color: '#8b949e' } },
                    x: { grid: { display: false }, ticks: { color: '#8b949e' } }
                }
            };
        }
    };

    function varColor(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    window.onload = () => Dashboard.init();
</script>
